# ============================================
# Docker Compose for local development
# ============================================
# Usage: docker compose up --build
#
# Database: MongoDB Atlas (cloud) — set MONGO_URI in backend/.env
#
# Services:
#   - backend:  Express API on http://localhost:8000
#   - frontend: React app on http://localhost:3000

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teamsync-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:8000/api"
    container_name: teamsync-frontend
    restart: unless-stopped
    ports:
      - "3000:8080"
    depends_on:
      - backend

# ============================================
# GitHub Actions — Deploy to Google Cloud Run
# ============================================
#
# Triggers on push to `main` branch.
# Deploys 2 Cloud Run services: backend + frontend
# Database: MongoDB Atlas (external, not managed by GCP)
#
# ---- Required GitHub Secrets ----
# GCP_PROJECT_ID          — Google Cloud project ID
# GCP_REGION              — e.g. asia-southeast1
# GCP_SA_KEY              — Service account JSON key (raw JSON, not base64)
#                            SA needs roles:
#                              - Cloud Run Admin
#                              - Artifact Registry Writer
#                              - Service Account User
#
# MONGO_URI               — MongoDB Atlas connection string (mongodb+srv://...)
# SESSION_SECRET          — Express session secret
# SESSION_EXPIRES_IN      — e.g. "1d"
# GOOGLE_CLIENT_ID        — Google OAuth client ID
# GOOGLE_CLIENT_SECRET    — Google OAuth client secret
# GOOGLE_CALLBACK_URL     — e.g. https://juno-backend-xxx.run.app/api/auth/google/callback
# FRONTEND_ORIGIN         — e.g. https://juno-frontend-xxx.run.app
# FRONTEND_GOOGLE_CALLBACK_URL — e.g. https://juno-frontend-xxx.run.app/google/callback
# VITE_API_BASE_URL       — e.g. https://juno-backend-xxx.run.app/api

name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger

env:
  BACKEND_SERVICE: juno-backend
  FRONTEND_SERVICE: juno-frontend
  GAR_LOCATION: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  BACKEND_IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/backend-juno-repo/backend
  FRONTEND_IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/frontend-juno-repo/frontend

jobs:
  # ================================================
  # Job 1: Build & Deploy Backend
  # ================================================
  deploy-backend:
    name: Backend → Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }} --quiet

      - name: Build backend image
        run: |
          docker build \
            -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.BACKEND_IMAGE }}:latest \
            -f backend/Dockerfile \
            backend

      - name: Push backend image
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Deploy backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SERVICE }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          flags: |
            --port=8000
            --memory=512Mi
            --cpu=1
            --min-instances=1
            --max-instances=5
            --allow-unauthenticated
          env_vars: |
            NODE_ENV=production
            PORT=8000
            BASE_PATH=/api
            MONGO_URI=${{ secrets.MONGO_URI }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            SESSION_EXPIRES_IN=${{ secrets.SESSION_EXPIRES_IN }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }}
            FRONTEND_ORIGIN=${{ secrets.FRONTEND_ORIGIN }}
            FRONTEND_GOOGLE_CALLBACK_URL=${{ secrets.FRONTEND_GOOGLE_CALLBACK_URL }}

      - name: Show backend URL
        run: |
          echo "✅ Backend deployed to:"
          gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --region=${{ secrets.GCP_REGION }} \
            --format='value(status.url)'

  # ================================================
  # Job 2: Build & Deploy Frontend
  # ================================================
  deploy-frontend:
    name: Frontend → Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }} --quiet

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} \
            -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.FRONTEND_IMAGE }}:latest \
            -f client/Dockerfile \
            client

      - name: Push frontend image
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

      - name: Deploy frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          flags: |
            --port=8080
            --memory=256Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --allow-unauthenticated

      - name: Show frontend URL
        run: |
          echo "✅ Frontend deployed to:"
          gcloud run services describe ${{ env.FRONTEND_SERVICE }} \
            --region=${{ secrets.GCP_REGION }} \
            --format='value(status.url)'
